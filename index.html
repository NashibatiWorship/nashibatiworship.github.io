<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nashibati Worship</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h2 {
      color: #cbd5e1;
      font-weight: normal;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      margin: 30px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 5px;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>Nashibati Worship</h1>
  <h2>Echoes of Glory</h2>
</header>

<div class="card">
  <p>Welcome to Nashibati Worship.</p>
  <p>Original Christian worship songs, multilingual lyrics and Bible-based music glorifying Jesus Christ.</p>
</div>

<div class="card">
  <h3>Languages</h3>
  <ul>
    <li>Wolof</li>
    <li>English</li>
    <li>Français</li>
    <li>Español</li>
    <li>Português</li>
  </ul>
</div>

<footer>
  © 2026 Nashibati Worship
</footer>

</body>
</html>
